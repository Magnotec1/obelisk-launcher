app-id: com.magnotec.obelisk
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: obelisk
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --socket=pulseaudio
  - --filesystem=host
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/obelisk/.cargo

modules:
  - name: obelisk
    buildsystem: simple
    build-commands:
      - cargo build --release
      - install -Dm755 target/release/obelisk -t /app/bin/
      - install -Dm644 flatpak/com.magnotec.obelisk.desktop -t /app/share/applications/
      - VERSION=$(grep -m 1 '^version =' Cargo.toml | cut -d '"' -f 2) && sed -E "s/<release version=\"[^\"]*\"/<release version=\"$VERSION\"/" flatpak/com.magnotec.obelisk.metainfo.xml > flatpak/com.magnotec.obelisk.metainfo.xml.tmp && install -Dm644 flatpak/com.magnotec.obelisk.metainfo.xml.tmp /app/share/metainfo/com.magnotec.obelisk.metainfo.xml
      - install -Dm644 data/com.magnotec.obelisk.svg -t /app/share/icons/hicolor/scalable/apps/
      - mkdir -p /app/bin
      - |
        echo '#!/bin/sh
        if [ "$1" = "-q" ] || [ -z "$1" ]; then
          echo "Screen 0: minimum 320 x 200, current 1920 x 1080, maximum 16384 x 16384"
          echo "default connected primary 1920x1080+0+0 0mm x 0mm"
          echo "   1920x1080     60.00* "
          echo "   1280x720      60.00  "
          echo "   1024x768      60.00  "
          echo "   800x600       60.00  "
        fi' > /app/bin/xrandr
      - chmod +x /app/bin/xrandr
    sources:
      - type: dir
        path: ..
